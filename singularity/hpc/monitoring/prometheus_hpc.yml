global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── HPC-specific scrape jobs (complement singularity/prometheus.yml) ──────────

scrape_configs:

  # NVIDIA DCGM Exporter — GPU utilization, memory, power, temperature
  - job_name: gpu_dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Prometheus SLURM Exporter — job counts, queue depth, node states
  - job_name: slurm
    static_configs:
      - targets: ["slurm-exporter:8080"]
    scrape_interval: 30s

  # Node Exporter with InfiniBand collector — IB port counters, bandwidth
  - job_name: infiniband
    static_configs:
      - targets: ["node-exporter:9100"]
    params:
      collect[]:
        - infiniband
        - cpu
        - meminfo
        - diskstats
        - filesystem
    relabel_configs:
      - source_labels: [__address__]
        target_label: node

  # Apptainer textfile collector — container runtime metrics (generated by cron)
  - job_name: apptainer
    static_configs:
      - targets: ["node-exporter:9100"]
    params:
      collect[]:
        - textfile
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "apptainer_.*"
        action: keep

# ── Alerting rules ─────────────────────────────────────────────────────────────

rule_files:
  - "hpc_alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
