name: autonomous-coding-audit-tests

on:
  pull_request:
    paths:
      - .github/workflows/autonomous-coding-audit-tests.yml
      - autonomous-coding/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/autonomous-coding-audit-tests.yml
      - autonomous-coding/**

jobs:
  audit-and-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autonomous-coding
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: autonomous-coding/requirements.txt

      - name: Install dependencies and audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      - name: Dependency audit
        run: |
          # Temporary ignore for known issue with no published fix yet.
          pip-audit -r requirements.txt --ignore-vuln CVE-2026-4539

      - name: Run tests
        run: pytest tests test_security.py tests/test_security_hook.py -q

      - name: Run 5 dry-run smoke commands (no remote LLM)
        shell: bash
        run: |
          set -euo pipefail

          for i in 1 2 3 4 5; do
            cmd="python autonomous_agent_demo.py --project-dir ./ci_dry_run_${i} --dry-run"
            echo "[$i/5] Executing: $cmd"
            eval "$cmd"
          done
