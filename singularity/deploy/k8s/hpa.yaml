apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: singularity
  labels:
    app: singularity
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: singularity
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # NOTE: to scale on SLO burn rate (Fáze 58) expose the /slo metrics via a
    # Prometheus Adapter and add a `type: Pods` custom metric here.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
